<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | YB Studio</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4a373;
            --accent-hover: #bc8a5f;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
        }

        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eeeeee;
            text-align: center;
        }

        .logo {
            height: 45px;
            margin-bottom: 25px;
        }


        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            color: #1a1a1a;
        }

        p {
            color: #666666;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }


        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: #fdfdfd;
            border: 1px solid #dddddd;
            border-radius: 8px;
            color: #1a1a1a;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.1);
        }


        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: var(--accent-hover);
        }

        .error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="images/wedding/YB copy.png" alt="Logo" class="logo">
    <h1>Admin Access</h1>
    <p>Please enter your credentials</p>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-btn">Login</button>
        <div id="errorMessage" class="error">Invalid username or password</div>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');

        try {
            // Simple verification - change these values for security
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('isAdminLoggedIn', 'true');
                window.location.href = 'adminIndex.html';
            } else {
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            console.error('Login error:', err);
        }
    });

    // If already logged in, skip login page
    if (localStorage.getItem('isAdminLoggedIn') === 'true') {
        window.location.href = 'adminIndex.html';
    }
</script>

</body>
</html>
